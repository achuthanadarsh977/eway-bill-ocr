<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eway Bill OCR</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .drag-over { border-color: #4f46e5 !important; background-color: #eef2ff !important; }
    .spin { animation: spin 0.9s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-slate-100 min-h-screen font-sans">

  <!-- Header -->
  <header class="bg-indigo-700 shadow-lg">
    <div class="max-w-5xl mx-auto px-6 py-5 flex items-center gap-3">
      <span class="text-3xl">📋</span>
      <div>
        <h1 class="text-white text-xl font-bold tracking-tight">Eway Bill OCR</h1>
        <p class="text-indigo-200 text-xs mt-0.5">Extract structured data from Eway Bill PDFs</p>
      </div>
    </div>
  </header>

  <main class="max-w-5xl mx-auto px-4 py-10">

    <!-- Upload zone -->
    <div id="upload-section">
      <div id="drop-zone"
        class="bg-white border-2 border-dashed border-indigo-300 rounded-2xl p-16 text-center cursor-pointer transition-all hover:border-indigo-500 hover:bg-indigo-50 shadow-sm select-none"
        onclick="document.getElementById('file-input').click()">
        <div class="text-6xl mb-4">📄</div>
        <p class="text-xl font-semibold text-gray-700">Drag &amp; drop Eway Bill PDF here</p>
        <p class="text-gray-400 mt-2 mb-6 text-sm">or click to browse files</p>
        <span class="bg-indigo-600 text-white px-6 py-2.5 rounded-lg text-sm font-medium pointer-events-none">
          Choose PDF
        </span>
        <p class="text-xs text-gray-400 mt-6">Supports digital and scanned PDFs &middot; Max 20 MB</p>
      </div>
      <input type="file" id="file-input" accept=".pdf" class="hidden" />
    </div>

    <!-- Loading -->
    <div id="loading-section" class="hidden text-center py-28">
      <div class="spin inline-block w-14 h-14 border-4 border-indigo-600 border-t-transparent rounded-full mb-6"></div>
      <p class="text-xl font-semibold text-gray-700">Processing Eway Bill...</p>
      <p class="text-sm text-gray-400 mt-2">Extracting and parsing fields from PDF</p>
    </div>

    <!-- Error -->
    <div id="error-section" class="hidden">
      <div class="bg-red-50 border border-red-200 rounded-xl p-6">
        <p class="font-bold text-red-700 text-base">Processing Failed</p>
        <p class="text-red-600 mt-1 text-sm" id="error-msg"></p>
      </div>
      <button onclick="resetUI()" class="mt-4 text-indigo-600 text-sm hover:underline">&#8592; Try another file</button>
    </div>

    <!-- Results -->
    <div id="results-section" class="hidden">

      <!-- Action bar -->
      <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-5 mb-6 flex flex-wrap items-center justify-between gap-4">
        <div>
          <p class="font-bold text-gray-800 text-base" id="res-filename"></p>
          <p class="text-sm text-gray-400 mt-0.5" id="res-meta"></p>
        </div>
        <div class="flex flex-wrap gap-2">
          <button onclick="copyJSON()" id="copy-btn"
            class="bg-slate-100 hover:bg-slate-200 text-gray-700 px-4 py-2 rounded-lg text-sm font-medium transition">
            Copy JSON
          </button>
          <button onclick="downloadJSON()"
            class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition">
            &#8659; JSON
          </button>
          <button onclick="downloadCSV()"
            class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition">
            &#8659; CSV
          </button>
          <button onclick="resetUI()"
            class="border border-gray-300 hover:bg-gray-50 text-gray-600 px-4 py-2 rounded-lg text-sm font-medium transition">
            Upload New
          </button>
        </div>
      </div>

      <!-- Data cards -->
      <div id="data-cards" class="grid grid-cols-1 lg:grid-cols-2 gap-5"></div>
    </div>

  </main>

  <script>
    let resultData = null;
    let resultFilename = '';

    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');

    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.classList.add('drag-over');
    });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      const file = e.dataTransfer.files[0];
      if (file) processFile(file);
    });
    fileInput.addEventListener('change', () => {
      if (fileInput.files[0]) processFile(fileInput.files[0]);
    });

    async function processFile(file) {
      if (!file.name.toLowerCase().endsWith('.pdf')) {
        alert('Please upload a PDF file.');
        return;
      }

      show('loading-section');
      hide('upload-section');
      hide('error-section');
      hide('results-section');

      const formData = new FormData();
      formData.append('pdf', file);

      try {
        const res = await fetch('/api/ocr', { method: 'POST', body: formData });
        const json = await res.json();

        if (!res.ok || !json.success) {
          showError(json.error || 'Unknown error occurred');
          return;
        }

        resultData = json.data;
        resultFilename = json.filename;
        renderResults(json);
        show('results-section');
      } catch (err) {
        showError('Could not reach server: ' + err.message);
      } finally {
        hide('loading-section');
      }
    }

    function renderResults(json) {
      document.getElementById('res-filename').textContent = json.filename;
      document.getElementById('res-meta').textContent =
        json.numPages + ' page(s) · ' + json.pdfType + ' PDF';

      const cards = document.getElementById('data-cards');
      cards.innerHTML = '';

      const sections = [
        { title: 'EWB Details',             color: 'indigo',  data: json.data.ewb_details },
        { title: 'From Party (Supplier)',    color: 'blue',    data: json.data.from_party },
        { title: 'To Party (Recipient)',     color: 'violet',  data: json.data.to_party },
        { title: 'Item Details',             color: 'amber',   data: json.data.item_details },
        { title: 'Transporter Details',      color: 'emerald', data: json.data.transporter_details },
      ];

      for (const section of sections) {
        cards.appendChild(buildCard(section));
      }
    }

    const colorHeaders = {
      indigo:  'bg-indigo-600',
      blue:    'bg-blue-600',
      violet:  'bg-violet-600',
      amber:   'bg-amber-500',
      emerald: 'bg-emerald-600',
    };

    function buildCard({ title, color, data }) {
      const card = document.createElement('div');
      card.className = 'bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden';

      const rows = Object.entries(data).map(([k, v]) => {
        const display = Array.isArray(v) ? (v.join(', ') || '—') : (v || '—');
        return `
          <div class="flex justify-between items-start py-2.5 gap-4 border-b border-gray-100 last:border-0">
            <span class="text-xs text-gray-400 font-semibold uppercase tracking-wide shrink-0 pt-0.5">${k.replace(/_/g, ' ')}</span>
            <span class="text-sm text-gray-800 text-right font-mono break-all">${display}</span>
          </div>`;
      }).join('');

      card.innerHTML = `
        <div class="${colorHeaders[color]} px-5 py-3">
          <h3 class="text-white font-semibold text-sm tracking-wide">${title}</h3>
        </div>
        <div class="px-5 py-1">${rows}</div>`;

      return card;
    }

    function downloadJSON() {
      if (!resultData) return;
      const blob = new Blob([JSON.stringify(resultData, null, 2)], { type: 'application/json' });
      triggerDownload(blob, stem() + '_ocr.json');
    }

    function downloadCSV() {
      if (!resultData) return;
      const flat = {};
      for (const [section, fields] of Object.entries(resultData)) {
        for (const [key, val] of Object.entries(fields)) {
          flat[section + '__' + key] = Array.isArray(val) ? val.join('|') : String(val ?? '');
        }
      }
      const headers = Object.keys(flat).join(',');
      const values  = Object.values(flat).map(v => '"' + String(v).replace(/"/g, '""') + '"').join(',');
      const blob = new Blob([headers + '\n' + values + '\n'], { type: 'text/csv' });
      triggerDownload(blob, stem() + '_ocr.csv');
    }

    async function copyJSON() {
      if (!resultData) return;
      await navigator.clipboard.writeText(JSON.stringify(resultData, null, 2));
      const btn = document.getElementById('copy-btn');
      btn.textContent = '✓ Copied!';
      setTimeout(() => btn.textContent = 'Copy JSON', 2000);
    }

    function triggerDownload(blob, filename) {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = filename;
      a.click();
      URL.revokeObjectURL(a.href);
    }

    function stem() {
      return resultFilename.replace(/\.pdf$/i, '');
    }

    function showError(msg) {
      document.getElementById('error-msg').textContent = msg;
      show('error-section');
      hide('loading-section');
    }

    function resetUI() {
      resultData = null;
      resultFilename = '';
      fileInput.value = '';
      show('upload-section');
      hide('results-section');
      hide('error-section');
      hide('loading-section');
    }

    function show(id) { document.getElementById(id).classList.remove('hidden'); }
    function hide(id) { document.getElementById(id).classList.add('hidden'); }
  </script>
</body>
</html>
